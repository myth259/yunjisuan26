# 后端 Flask API Deployment
# 任务3 要求：副本数=2，设置 resources.requests 和 .limits
# configMapRef 注入 Redis 地址，secretKeyRef 注入 Redis 密码
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 2                       # ← 保持 2，不要修改
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: swr-secret
      containers:
      - name: backend
        # ====== 替换为你的 SWR 镜像地址 ======
        image: swr.cn-north-4.myhuaweicloud.com/yunjisuan26/backend:v1
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        # 从 ConfigMap 注入非敏感环境变量
        envFrom:
        - configMapRef:
            name: backend-config
        # 从 Secret 注入 Redis 密码
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        livenessProbe:
          httpGet:
            path: /api/ping
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
