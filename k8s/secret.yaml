# ── Redis 密码 Secret（敏感配置，任务3）───────────────
# 编码命令：echo -n "your_password" | base64
# 示例：echo -n "redis123" | base64 → cmVkaXMxMjM=
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: default
type: Opaque
data:
  # ====== 替换：运行 echo -n "你的密码" | base64 得到编码值 ======
  password: cmVkaXMxMjM=
