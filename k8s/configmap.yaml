# ── 应用配置 ConfigMap（非敏感配置，任务3）────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: default
data:
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  APP_ENV: "production"
---
# ── Nginx 配置 ConfigMap（任务5：Volume 挂载形式）──────
# 修改此 ConfigMap 后，kubectl apply 即可更新前端 Pod 中的 nginx.conf
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  nginx.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 反向代理到后端 Service（任务5验证：修改端口值如 5000→5001，exec 进 Pod 查看变化）
        location /api/ {
            proxy_pass http://backend-svc.default.svc.cluster.local:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
